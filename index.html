<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Docs Viewer</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-gray-200">

    <div class="relative flex flex-col h-screen">
        <header class="bg-gray-800/50 backdrop-blur-sm border-b border-gray-700 p-4 shadow-lg z-20">
            <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
                <button id="menu-toggle" class="md:hidden p-2 rounded-md hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-blue-500">
                    <i data-lucide="menu" class="h-6 w-6"></i>
                    <span class="sr-only">Open menu</span>
                </button>

                <div class="flex items-center gap-3">
                    <i data-lucide="book-open-check" class="text-blue-400"></i>
                    <h1 class="text-xl font-bold text-white">GitHub Docs</h1>
                </div>

                <div id="repo-display" class="hidden sm:block text-gray-400 text-sm truncate"></div>
            </div>
             <div id="repo-display-mobile" class="sm:hidden text-gray-400 text-sm truncate mt-3 text-center"></div>
        </header>

        <div class="flex-grow flex min-h-0">
            <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-80 bg-gray-800 border-r border-gray-700 overflow-y-auto p-4 transform -translate-x-full transition-transform duration-300 ease-in-out md:relative md:translate-x-0 md:w-1/4 md:max-w-xs md:flex-shrink-0">
                <h2 class="text-lg font-semibold mb-3 text-white">Documentation</h2>
                <div id="file-tree">
                    <p class="text-gray-400 text-sm">Loading documentation...</p>
                </div>
            </aside>

            <div id="sidebar-backdrop" class="fixed inset-0 bg-black/60 z-20 hidden md:hidden"></div>

            <main class="flex-1 h-full overflow-y-auto p-6 md:p-8">
                <div id="loader" class="hidden justify-center items-center h-full">
                    <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-blue-500"></div>
                </div>
                <div id="error-message" class="hidden p-4 bg-red-900/50 border border-red-700 text-red-300 rounded-md"></div>
                <div id="content-display" class="prose prose-invert max-w-none markdown-body">
                    <div id="initial-message" class="text-center py-20">
                         <i data-lucide="file-text" class="mx-auto h-24 w-24 text-gray-600"></i>
                        <h2 class="mt-2 text-2xl font-semibold text-gray-400">Welcome</h2>
                        <p class="mt-1 text-gray-500">Select a file from the explorer to view its content.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src = "script.js">

    </script>
</body>
</html>
